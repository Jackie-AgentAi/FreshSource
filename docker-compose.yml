services:
  mysql:
    image: mysql:8.0
    container_name: freshmart-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: freshmart
      MYSQL_USER: freshmart
      MYSQL_PASSWORD: freshmart
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./migration/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      - ./migration/002_seed.sql:/docker-entrypoint-initdb.d/002_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: freshmart-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: freshmart-api
    environment:
      APP_NAME: freshmart-api
      APP_ENV: development
      APP_PORT: 8080
      JWT_SECRET: freshmart-dev-secret
      RATE_LIMIT_PER_MINUTE: 120
      DB_DSN: freshmart:freshmart@tcp(mysql:3306)/freshmart?charset=utf8mb4&parseTime=True&loc=Local
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: freshmart-nginx
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
